x-image: &image ghcr.io/ra1nwarden/dota2-cv:latest
x-workspace: &workspace
  - /mnt/primary/appdata/dota2-cv:/workspace
x-gpu: &gpu
  resources:
    reservations:
      devices:
        - driver: nvidia
          count: 1
          capabilities: [gpu]

services:
  dota2-cv:
    image: *image
    working_dir: /workspace
    command: uvicorn main:app --host 0.0.0.0 --port 8080 --workers 1
    volumes: *workspace
    deploy: *gpu
    ports:
      - "18080:8080"
    environment:
      - WORKSPACE=/workspace
      - GSI_AUTH_TOKEN=dota2_coaching_secret
    shm_size: 2g
    restart: unless-stopped
