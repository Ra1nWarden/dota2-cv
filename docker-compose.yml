services:
  dota2-cv:
    image: ghcr.io/ra1nwarden/dota2-cv:latest
    volumes:
      - /mnt/primary/appdata/dota2-cv:/workspace
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "18080:8080"   # Inference API
      - "16006:6006"   # TensorBoard
    stdin_open: true
    tty: true
